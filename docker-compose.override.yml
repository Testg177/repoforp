version: '3.9'

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-DevPassword123!}
    ports:
      - "5432:5432"

  pgadmin:
    environment:
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-AdminDev123!}

  blazorapp:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    build:
      target: development
