version: '3.9'

services:
  postgres:
    image: postgres:16-bookworm
    container_name: blazorapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blazorapp}
      POSTGRES_USER: ${POSTGRES_USER:-blazorapp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LANG: pl_PL.UTF-8
      LC_ALL: pl_PL.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blazorapp_user} -d ${POSTGRES_DB:-blazorapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8.10
    container_name: blazorapp_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@firma.pl}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  blazorapp:
    build:
      context: .
      dockerfile: src/BlazorApp.Web/Dockerfile
    container_name: blazorapp_web
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-blazorapp};Username=${POSTGRES_USER:-blazorapp_user};Password=${POSTGRES_PASSWORD};Include Error Detail=true;Application Name=BlazorApp
      AdminBootstrap__SuperAdminEmail: ${SUPERADMIN_EMAIL:-superadmin@firma.pl}
      AdminBootstrap__SuperAdminPassword: ${SUPERADMIN_PASSWORD:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
