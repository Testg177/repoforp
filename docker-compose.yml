version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: blazorapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blazorapp}
      POSTGRES_USER: ${POSTGRES_USER:-blazorapp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blazorapp_user} -d ${POSTGRES_DB:-blazorapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: blazorapp_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@firma.pl}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  blazorapp:
    build:
      context: .
      dockerfile: src/BlazorApp.Web/Dockerfile
    container_name: blazorapp_web
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-blazorapp};Username=${POSTGRES_USER:-blazorapp_user};Password=${POSTGRES_PASSWORD};Include Error Detail=true
    ports:
      - "8080:8080"
    volumes:
      - archive_data:/app/archiwum
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  archive_data:
